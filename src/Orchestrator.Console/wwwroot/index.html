<!DOCTYPE html>
<!--
  FILE PURPOSE (in plain terms): The operator console's single web page. It loads the
  fleet + program list from the local server, lets you rename machines and tick which
  machines run which program (a grid of checkboxes), and saves your changes back to
  GitHub. All CSS/JS is inline so it needs nothing from the internet.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orchestrator Console</title>
  <style>
    :root {
      --bg: #f6f7f9; --card: #fff; --ink: #1b1f24; --muted: #6b7280;
      --line: #e5e7eb; --accent: #2563eb; --ok: #16a34a; --off: #9ca3af;
      --err: #dc2626; --okbg: #ecfdf5; --errbg: #fef2f2;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--ink); }
    header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
             padding: 14px 20px; background: var(--card); border-bottom: 1px solid var(--line); }
    header h1 { font-size: 16px; margin: 0; }
    header .repo { color: var(--muted); font-size: 12px; }
    header .spacer { flex: 1; }
    button { font: inherit; border: 1px solid var(--line); background: var(--card); color: var(--ink);
             padding: 7px 14px; border-radius: 8px; cursor: pointer; }
    button:hover { border-color: #cbd0d6; }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.primary:disabled { opacity: .5; cursor: default; }
    main { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
            padding: 16px 18px; margin-bottom: 20px; }
    .card h2 { font-size: 14px; margin: 0 0 12px; }
    .muted { color: var(--muted); }
    .warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e;
            padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
    th { font-size: 12px; color: var(--muted); font-weight: 600; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; }
    .dot.on { background: var(--ok); } .dot.off { background: var(--off); }
    .pill { font-size: 11px; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--line); }
    .pill.ok { background: var(--okbg); color: var(--ok); border-color: #a7f3d0; }
    .pill.bad { background: var(--errbg); color: var(--err); border-color: #fecaca; }
    input.label { font: inherit; padding: 4px 8px; border: 1px solid var(--line); border-radius: 6px; width: 160px; }
    .scroll { overflow-x: auto; }
    .matrix th.mcol { text-align: center; white-space: nowrap; }
    .matrix td.cell { text-align: center; }
    .matrix td.prog { white-space: nowrap; }
    .matrix .allbox { text-align: center; }
    code { background: #f1f3f5; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
    #toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
             background: #111827; color: #fff; padding: 10px 16px; border-radius: 10px;
             font-size: 13px; opacity: 0; transition: opacity .2s; pointer-events: none; }
    #toast.show { opacity: 1; }
    #toast.err { background: var(--err); }
    .empty { color: var(--muted); padding: 12px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Orchestrator Console</h1>
    <span class="repo" id="repo"></span>
    <span class="spacer"></span>
    <button id="reload">Reload</button>
    <button id="save" class="primary" disabled>Save &amp; push</button>
  </header>

  <main>
    <div id="warnings"></div>

    <div class="card">
      <h2>Machines</h2>
      <div class="scroll">
        <table id="machines">
          <thead>
            <tr>
              <th>Status</th><th>Label</th><th>Hostname</th><th>OS</th>
              <th>Agent</th><th>Last seen</th><th>Running</th><th>Last sync</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="noMachines" hidden>No machines have reported yet.</div>
    </div>

    <div class="card">
      <h2>Targeting <span class="muted">— tick which machines run each program</span></h2>
      <div class="scroll">
        <table id="matrix" class="matrix">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="noPrograms" hidden>No active programs in the manifest.</div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    let state = null;
    let dirty = false;

    const $ = (s, r = document) => r.querySelector(s);
    const el = (tag, props = {}, kids = []) => {
      const n = Object.assign(document.createElement(tag), props);
      for (const k of [].concat(kids)) n.append(k);
      return n;
    };

    function markDirty() { dirty = true; $('#save').disabled = false; }

    function toast(msg, isErr = false) {
      const t = $('#toast');
      t.textContent = msg; t.className = 'show' + (isErr ? ' err' : '');
      setTimeout(() => (t.className = ''), 3200);
    }

    function relTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso); if (isNaN(d)) return iso;
      const secs = Math.round((Date.now() - d.getTime()) / 1000);
      if (secs < 60) return secs + 's ago';
      if (secs < 3600) return Math.round(secs / 60) + 'm ago';
      if (secs < 86400) return Math.round(secs / 3600) + 'h ago';
      return Math.round(secs / 86400) + 'd ago';
    }

    // Does a program currently apply to a machine? (matches the service's rule)
    function applies(prog, m) {
      if (prog.allMachines) return true;
      return prog.target.some(t =>
        t.toLowerCase() === 'all' ||
        t.toLowerCase() === m.machineId.toLowerCase() ||
        t.toLowerCase() === m.hostname.toLowerCase());
    }

    async function load() {
      $('#save').disabled = true; dirty = false;
      let data;
      try {
        const r = await fetch('/api/state');
        if (!r.ok) { toast('Load failed: ' + (await r.text()), true); return; }
        data = await r.json();
      } catch (e) { toast('Load failed: ' + e.message, true); return; }
      state = data;
      // Only active programs are targetable; hide deleted ones from the grid.
      state.programs = (data.programs || []).filter(p => (p.status || 'active').toLowerCase() === 'active');

      // Working selection: a Set of machineIds per program, plus an "all" flag.
      state.sel = {};
      for (const p of state.programs) {
        const checked = new Set(state.machines.filter(m => applies(p, m)).map(m => m.machineId));
        state.sel[p.id] = { all: p.allMachines, ids: checked };
      }
      state.labelEdits = {};

      render();
    }

    function render() {
      // warnings
      const w = $('#warnings'); w.innerHTML = '';
      for (const msg of state.warnings || []) w.append(el('div', { className: 'warn', textContent: msg }));

      renderMachines();
      renderMatrix();
    }

    function renderMachines() {
      const tb = $('#machines tbody'); tb.innerHTML = '';
      $('#noMachines').hidden = state.machines.length > 0;
      for (const m of state.machines) {
        const status = el('td', {}, [
          el('span', { className: 'dot ' + (m.online ? 'on' : 'off') }),
          m.online ? 'online' : 'offline'
        ]);
        const labelInput = el('input', {
          className: 'label', value: m.label || '', placeholder: m.hostname,
          oninput: e => { state.labelEdits[m.machineId] = e.target.value; markDirty(); }
        });
        const sync = m.lastSyncSuccess
          ? el('span', { className: 'pill ok', textContent: 'ok' })
          : el('span', { className: 'pill bad', title: m.lastError || '', textContent: 'error' });
        tb.append(el('tr', {}, [
          status,
          el('td', {}, labelInput),
          el('td', {}, el('code', { textContent: m.hostname })),
          el('td', { className: 'muted', textContent: m.os || '—' }),
          el('td', { className: 'muted', textContent: m.agentVersion || '—' }),
          el('td', { title: m.lastSeenUtc || '', textContent: relTime(m.lastSeenUtc) }),
          el('td', { textContent: (m.appliedProgramIds || []).length + ' program(s)' }),
          el('td', {}, sync)
        ]));
      }
    }

    function renderMatrix() {
      const thead = $('#matrix thead'), tbody = $('#matrix tbody');
      thead.innerHTML = ''; tbody.innerHTML = '';
      $('#noPrograms').hidden = state.programs.length > 0;
      if (state.programs.length === 0) return;

      // header row: program | All | one column per machine
      const hr = el('tr', {}, [ el('th', { textContent: 'Program' }), el('th', { textContent: 'All' }) ]);
      for (const m of state.machines) {
        hr.append(el('th', { className: 'mcol', title: m.hostname },
          el('span', {}, [ el('span', { className: 'dot ' + (m.online ? 'on' : 'off') }), m.label || m.hostname ])));
      }
      thead.append(hr);

      for (const p of state.programs) {
        const sel = state.sel[p.id];
        const row = el('tr', {}, [
          el('td', { className: 'prog' }, [ el('strong', { textContent: p.name }),
            el('div', { className: 'muted', textContent: (p.id + (p.version ? ' · v' + p.version : '')) }) ])
        ]);

        // "All machines" toggle
        const allBox = el('input', { type: 'checkbox', checked: sel.all,
          onchange: e => { sel.all = e.target.checked; markDirty(); renderMatrix(); } });
        row.append(el('td', { className: 'allbox' }, allBox));

        // per-machine cells
        for (const m of state.machines) {
          const cb = el('input', {
            type: 'checkbox',
            checked: sel.all || sel.ids.has(m.machineId),
            disabled: sel.all,
            onchange: e => { e.target.checked ? sel.ids.add(m.machineId) : sel.ids.delete(m.machineId); markDirty(); }
          });
          row.append(el('td', { className: 'cell' }, cb));
        }
        tbody.append(row);
      }
    }

    async function save() {
      const body = {
        programTargets: state.programs.map(p => ({
          id: p.id, all: state.sel[p.id].all, machineIds: [...state.sel[p.id].ids]
        })),
        labels: {}
      };
      // start from existing labels, apply edits
      for (const m of state.machines) if (m.label) body.labels[m.machineId] = m.label;
      for (const [id, v] of Object.entries(state.labelEdits)) {
        if (v && v.trim()) body.labels[id] = v.trim(); else delete body.labels[id];
      }

      $('#save').disabled = true;
      try {
        const r = await fetch('/api/save', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
        });
        const res = await r.json().catch(() => ({ message: r.statusText }));
        if (r.ok && res.ok) {
          toast(res.commit ? `Saved · commit ${res.commit}` : (res.message || 'Saved'));
          await load();
        } else {
          toast('Save failed: ' + (res.message || res.detail || 'unknown error'), true);
          $('#save').disabled = false;
        }
      } catch (e) { toast('Save failed: ' + e.message, true); $('#save').disabled = false; }
    }

    $('#reload').onclick = () => {
      if (dirty && !confirm('Discard unsaved changes and reload?')) return;
      load();
    };
    $('#save').onclick = save;

    fetch('/api/info').then(r => r.json()).then(i => { $('#repo').textContent = i.repoPath; }).catch(() => {});
    load();
  </script>
</body>
</html>
